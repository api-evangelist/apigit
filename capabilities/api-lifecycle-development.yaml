naftiko: 1.0.0-alpha2
info:
  label: APIGit API Lifecycle Development
  description: Workflow for Git-native API lifecycle development using APIGit - managing API repositories, designing APIs
    with visual tools, running mock servers for development, and executing automated tests.
  tags:
  - APIGit
  - API Lifecycle
  - Git
  - Mocking
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    APIGIT_API_KEY: APIGIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: apigit
    baseUri: https://api.apigit.com/v1
    description: APIGit REST API.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{APIGIT_API_KEY}}'
      placement: header
    resources:
    - name: repositories
      path: /repos
      description: Manage API Git repositories.
      operations:
      - name: list-repositories
        method: GET
        description: List all API repositories.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-repository
        method: POST
        description: Create a new API repository.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: mocks
      path: /repos/{repoId}/mock
      description: Manage mock servers.
      operations:
      - name: start-mock
        method: POST
        description: Start a dynamic mock server.
        inputParameters:
        - name: repoId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: apigit-lifecycle-api
    description: Unified REST API for APIGit lifecycle management.
    resources:
    - path: /v1/repos
      operations:
      - method: GET
        name: list-repositories
        description: List repositories.
        call: apigit.list-repositories
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-repository
        description: Create repository.
        call: apigit.create-repository
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: apigit-lifecycle-mcp
    transport: http
    description: MCP server for AI-assisted API lifecycle development with APIGit.
    tools:
    - name: list-api-repositories
      description: List all API Git repositories in APIGit.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apigit.list-repositories
      outputParameters:
      - type: object
        mapping: $.
    - name: create-api-repository
      description: Create a new Git-native API repository in APIGit.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: apigit.create-repository
      outputParameters:
      - type: object
        mapping: $.
    - name: start-mock-server
      description: Start a dynamic mock server from an API definition for development testing.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: apigit.start-mock
      outputParameters:
      - type: object
        mapping: $.
