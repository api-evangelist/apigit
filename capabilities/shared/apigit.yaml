naftiko: "1.0.0-alpha1"

info:
  label: "APIGit API"
  description: "APIGit Git-native API lifecycle platform API for managing repositories, API definitions, mock servers, and tests."
  tags:
    - APIGit
    - API Lifecycle
    - Git
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      APIGIT_API_KEY: APIGIT_API_KEY

capability:
  consumes:
    - type: http
      namespace: apigit
      baseUri: https://api.apigit.com/v1
      description: "APIGit REST API."
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{APIGIT_API_KEY}}"
        placement: header
      resources:
        - name: repositories
          path: /repos
          description: "Manage API Git repositories."
          operations:
            - name: list-repositories
              method: GET
              description: "List all API repositories."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-repository
              method: POST
              description: "Create a new API repository."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: mocks
          path: /repos/{repoId}/mock
          description: "Manage mock servers."
          operations:
            - name: start-mock
              method: POST
              description: "Start a dynamic mock server."
              inputParameters:
                - name: repoId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: apigit-rest
      resources:
        - path: /v1/repos
          operations:
            - method: GET
              name: list-repositories
              description: "List repositories."
              call: "apigit.list-repositories"
              outputParameters:
                - type: object
                  mapping: "$."
    - type: mcp
      port: 9100
      namespace: apigit-mcp
      transport: http
      tools:
        - name: list-repositories
          description: "List all API Git repositories."
          hints: {readOnly: true, destructive: false, idempotent: true}
          call: "apigit.list-repositories"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-repository
          description: "Create a new API Git repository."
          hints: {readOnly: false, destructive: false, idempotent: false}
          call: "apigit.create-repository"
          outputParameters:
            - type: object
              mapping: "$."
        - name: start-mock-server
          description: "Start a dynamic mock server for an API repository."
          hints: {readOnly: false, destructive: false, idempotent: false}
          call: "apigit.start-mock"
          outputParameters:
            - type: object
              mapping: "$."
