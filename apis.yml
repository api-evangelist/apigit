name: APIGit
description: >-
  APIGit is a Git-native platform for full lifecycle API development that
  combines version control, API design, documentation generation, governance,
  testing, and dynamic mock servers in a single integrated environment.
  Teams can build, publish, share, and secure APIs through Git-based workflows.
